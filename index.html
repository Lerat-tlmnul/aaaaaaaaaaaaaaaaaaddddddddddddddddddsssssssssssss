<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brother's Market | SECURE CLOUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        #loader { transition: opacity 0.5s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- CHARGEMENT -->
    <div id="loader" class="fixed inset-0 z-[999] bg-white flex flex-col items-center justify-center text-center px-6">
        <div id="loader-icon" class="w-12 h-12 border-4 border-slate-200 border-t-primary-600 rounded-full animate-spin mb-4"></div>
        <h2 id="loader-status" class="text-xl font-black tracking-tighter uppercase">Initialisation...</h2>
        <p id="loader-error" class="text-red-500 font-bold mt-4 hidden text-xs bg-red-50 p-4 rounded-lg border border-red-100 max-w-sm"></p>
    </div>

    <!-- NAVIGATION -->
    <nav id="nav" class="fixed top-0 w-full z-50 glass h-16 hidden">
        <div class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="showView('shop')">
                <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center text-white shadow-lg"><i class="fas fa-bolt text-xs"></i></div>
                <span class="text-xl font-black">Brother's <span class="text-primary-600">Market</span></span>
            </div>
            <div class="flex items-center gap-6">
                <button onclick="showView('shop')" class="text-[10px] font-black uppercase tracking-widest">Boutique</button>
                <button onclick="showView('orders')" class="text-[10px] font-black uppercase tracking-widest">Commandes</button>
                <button id="nav-admin" onclick="showView('admin')" class="hidden bg-slate-900 text-white px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest">Admin</button>
                <button onclick="logout()" class="text-slate-400 hover:text-red-500 ml-2"><i class="fas fa-power-off"></i></button>
            </div>
        </div>
    </nav>

    <main id="main-content" class="pt-24 pb-12 px-4 max-w-7xl mx-auto hidden">
        
        <!-- AUTHENTIFICATION (Login / Register) -->
        <section id="view-auth" class="flex items-center justify-center py-10">
            <div class="w-full max-w-md bg-white p-2 rounded-[2.5rem] shadow-2xl border border-slate-100">
                <!-- TABS -->
                <div class="flex p-2 gap-2 mb-6">
                    <button id="tab-login" onclick="toggleAuthTab('login')" class="flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest bg-primary-600 text-white transition-all">Connexion</button>
                    <button id="tab-register" onclick="toggleAuthTab('register')" class="flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest bg-slate-50 text-slate-400 transition-all">Créer Compte</button>
                </div>
                
                <div class="px-8 pb-8 space-y-4">
                    <h2 id="auth-title" class="text-3xl font-black mb-6 tracking-tighter text-center">Ravi de vous revoir</h2>
                    
                    <div class="space-y-4">
                        <div class="relative">
                            <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                            <input type="text" id="auth-user" placeholder="Nom d'utilisateur" class="w-full pl-12 p-4 rounded-xl bg-slate-50 border-2 border-transparent focus:border-primary-500 outline-none font-bold">
                        </div>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                            <input type="password" id="auth-pass" placeholder="Mot de passe" class="w-full pl-12 p-4 rounded-xl bg-slate-50 border-2 border-transparent focus:border-primary-500 outline-none font-bold">
                        </div>
                        <button id="auth-btn" onclick="handleAuth()" class="w-full py-4 bg-primary-600 text-white font-black rounded-xl shadow-lg hover:bg-primary-700 transition active:scale-95 uppercase tracking-widest text-xs">Accéder au Market</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- BOUTIQUE -->
        <section id="view-shop" class="hidden">
            <div class="flex justify-between items-center mb-10">
                <h1 class="text-4xl font-black tracking-tight italic underline">Le Stock.</h1>
                <button onclick="toggleCart(true)" class="relative p-4 bg-white rounded-2xl shadow-lg text-primary-600">
                    <i class="fas fa-shopping-basket"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 w-6 h-6 bg-primary-600 text-white text-[10px] font-black rounded-full flex items-center justify-center border-2 border-white">0</span>
                </button>
            </div>
            <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            <div id="no-products" class="hidden text-center py-20 bg-white rounded-3xl border border-dashed border-slate-300">
                <p class="font-bold text-slate-400 uppercase text-xs tracking-widest italic">Le stock est vide</p>
            </div>
        </section>

        <!-- ADMIN -->
        <section id="view-admin" class="hidden space-y-10">
            <div class="bg-primary-600 p-8 rounded-[2rem] text-white shadow-2xl">
                <h2 class="text-2xl font-black mb-6 italic underline">Contrôle du Stock Cloud</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="adm-n" placeholder="Nom du produit" class="p-4 rounded-xl bg-white/10 border border-white/20 outline-none font-bold placeholder:text-white/50 text-white">
                    <input type="number" id="adm-p" step="0.01" placeholder="Prix (€)" class="p-4 rounded-xl bg-white/10 border border-white/20 outline-none font-bold placeholder:text-white/50 text-white">
                    <input type="number" id="adm-s" placeholder="Quantité" class="p-4 rounded-xl bg-white/10 border border-white/20 outline-none font-bold placeholder:text-white/50 text-white">
                    <button onclick="adminAdd()" class="md:col-span-3 py-4 bg-white text-primary-600 font-black rounded-xl uppercase tracking-widest text-xs hover:bg-slate-100 transition">Ajouter au Stock</button>
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div><h3 class="text-xl font-black mb-6 uppercase tracking-widest flex items-center gap-2"><i class="fas fa-box text-primary-600"></i> Inventaire</h3><div id="adm-inventory" class="space-y-3"></div></div>
                <div><h3 class="text-xl font-black mb-6 uppercase tracking-widest text-primary-600 flex items-center gap-2"><i class="fas fa-bell"></i> Commandes Live</h3><div id="adm-orders" class="space-y-4"></div></div>
            </div>
        </section>

        <!-- MES COMMANDES -->
        <section id="view-orders" class="hidden max-w-2xl mx-auto">
            <h2 class="text-2xl font-black mb-8 italic underline">Mes achats</h2>
            <div id="my-orders" class="space-y-4"></div>
        </section>
    </main>

    <!-- PANIER -->
    <div id="cart-panel" class="fixed inset-y-0 right-0 w-full max-w-sm bg-white shadow-2xl z-[100] transform translate-x-full transition-transform duration-300 p-8 flex flex-col">
        <div class="flex justify-between items-center mb-8"><h2 class="text-2xl font-black">Mon Panier</h2><button onclick="toggleCart(false)" class="text-slate-400 hover:text-black"><i class="fas fa-times text-xl"></i></button></div>
        <div id="cart-items" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="pt-6 border-t mt-6">
            <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">Lieu de livraison</label>
            <select id="cart-spot" class="w-full p-4 bg-slate-50 rounded-xl mb-4 font-bold outline-none border border-slate-200">
                <option>Grand caillou</option>
                <option>Petits cailloux</option>
                <option>Les sacs</option>
            </select>
            <div class="flex justify-between items-center mb-6"><span class="font-bold text-slate-400">Total + Service</span><span id="cart-total" class="text-3xl font-black text-primary-600">0.00€</span></div>
            <button onclick="sendOrder()" class="w-full py-4 bg-primary-600 text-white font-black rounded-xl shadow-xl hover:bg-primary-700 transition">PAYER MAINTENANT</button>
        </div>
    </div>

    <div id="notifier" class="fixed bottom-6 right-6 z-[110] space-y-2"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, deleteDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyAoaOJ2K2_mR59CejL69IolD9775BQrJ_0",
            authDomain: "brothers-market-601dd.firebaseapp.com",
            projectId: "brothers-market-601dd",
            storageBucket: "brothers-market-601dd.firebasestorage.app",
            messagingSenderId: "1095476857815",
            appId: "1:1095476857815:web:2e6f5caf2587e14d9e9992",
            measurementId: "G-XNZKRYGF70"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'brothers-market-v1';

        const productsRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
        const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
        const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');

        let STATE = {
            user: JSON.parse(localStorage.getItem('bm_session')),
            authMode: 'login', // login | register
            products: [],
            orders: [],
            cart: [],
            isLoaded: false
        };

        async function boot() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (fbUser) => {
                    if (fbUser) setupListeners();
                });
            } catch(e) { showLoaderError(e.message); }
        }

        function setupListeners() {
            onSnapshot(productsRef, (snap) => {
                STATE.products = snap.docs.map(d => ({id: d.id, ...d.data()}));
                renderShop();
                if(STATE.user?.role === 'admin') renderAdmin();
                
                if (!STATE.isLoaded) {
                    STATE.isLoaded = true;
                    hideLoader();
                    initAppUI();
                }
            });

            onSnapshot(ordersRef, (snap) => {
                STATE.orders = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.timestamp - a.timestamp);
                renderMyOrders();
                if(STATE.user?.role === 'admin') renderAdmin();
            });
        }

        function initAppUI() {
            if(STATE.user) {
                document.getElementById('nav').classList.remove('hidden');
                document.getElementById('nav-admin').classList.toggle('hidden', STATE.user.role !== 'admin');
                showView('shop');
            } else { 
                showView('auth'); 
            }
        }

        // --- AUTH LOGIC ---

        window.toggleAuthTab = (mode) => {
            STATE.authMode = mode;
            const isLogin = mode === 'login';
            document.getElementById('tab-login').className = isLogin ? 'flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest bg-primary-600 text-white transition-all' : 'flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest bg-slate-50 text-slate-400 transition-all';
            document.getElementById('tab-register').className = !isLogin ? 'flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest bg-primary-600 text-white transition-all' : 'flex-1 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest bg-slate-50 text-slate-400 transition-all';
            document.getElementById('auth-title').innerText = isLogin ? 'Ravi de vous revoir' : 'Créer un compte';
            document.getElementById('auth-btn').innerText = isLogin ? 'Accéder au Market' : 'S\'inscrire maintenant';
        };

        window.handleAuth = async () => {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            if(!u || !p) return notify("Remplis tous les champs", "error");

            if(STATE.authMode === 'register') {
                // Inscription
                const userDoc = await getDoc(doc(usersRef, u.toLowerCase()));
                if(userDoc.exists()) return notify("Ce nom est déjà pris", "error");
                
                const newUser = {
                    username: u,
                    password: p, // Stockage simple pour démo
                    role: (u === 'Liam' || u === 'Jules') ? 'admin' : 'user'
                };
                await setDoc(doc(usersRef, u.toLowerCase()), newUser);
                notify("Compte créé ! Connecte-toi.");
                toggleAuthTab('login');
            } else {
                // Connexion
                const userDoc = await getDoc(doc(usersRef, u.toLowerCase()));
                if(!userDoc.exists()) return notify("Utilisateur inconnu", "error");
                
                const data = userDoc.data();
                if(data.password !== p) return notify("Mot de passe incorrect", "error");
                
                STATE.user = { user: data.username, role: data.role };
                localStorage.setItem('bm_session', JSON.stringify(STATE.user));
                initAppUI();
                notify("Heureux de vous voir, " + data.username);
            }
        };

        window.logout = () => { localStorage.clear(); location.reload(); };

        // --- UI & SHOP LOGIC ---

        window.showView = (v) => {
            ['view-auth', 'view-shop', 'view-admin', 'view-orders'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('hidden');
            });
            const target = document.getElementById(`view-${v}`);
            if(target) target.classList.remove('hidden');
        };

        function renderShop() {
            const list = document.getElementById('product-list');
            const empty = document.getElementById('no-products');
            if(!STATE.products.length) {
                list.innerHTML = "";
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            list.innerHTML = STATE.products.map(p => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-all">
                    <h3 class="font-black text-lg italic">${p.name}</h3>
                    <p class="text-2xl font-black text-primary-600 my-4">${p.price.toFixed(2)}€</p>
                    <div class="flex items-center justify-between">
                        <span class="text-[10px] font-black uppercase ${p.stock <= 0 ? 'text-red-500' : 'text-slate-400'}">
                            ${p.stock <= 0 ? 'Rupture' : 'Dispo: ' + p.stock}
                        </span>
                        <button onclick="addToCart('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''} class="px-4 py-2 bg-slate-900 text-white text-[10px] font-black rounded-lg uppercase disabled:opacity-20 transition active:scale-95">Prendre</button>
                    </div>
                </div>
            `).join('');
        }

        window.addToCart = (id) => {
            const p = STATE.products.find(x => x.id === id);
            const inCart = STATE.cart.find(x => x.id === id);
            if(inCart) { if(inCart.qty < p.stock) inCart.qty++; } else { STATE.cart.push({...p, qty: 1}); }
            updateCartUI();
            notify("Ajouté au panier");
        };

        function updateCartUI() {
            const count = STATE.cart.reduce((a,b) => a+b.qty, 0);
            document.getElementById('cart-count').innerText = count;
            const total = STATE.cart.reduce((a,b) => a + (b.price*b.qty), 0) + (STATE.cart.length > 0 ? 0.5 : 0);
            document.getElementById('cart-total').innerText = total.toFixed(2) + "€";
            document.getElementById('cart-items').innerHTML = STATE.cart.map(i => `
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <div class="flex flex-col">
                        <span class="font-black text-sm italic">${i.name}</span>
                        <span class="text-[10px] font-bold text-slate-400">Quantité: ${i.qty}</span>
                    </div>
                    <button onclick="removeFromCart('${i.id}')" class="text-red-400 hover:text-red-600 p-2"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        window.removeFromCart = (id) => { STATE.cart = STATE.cart.filter(x => x.id !== id); updateCartUI(); };
        window.toggleCart = (s) => document.getElementById('cart-panel').style.transform = s ? 'translateX(0)' : 'translateX(100%)';

        window.sendOrder = async () => {
            if(!STATE.cart.length) return;
            try {
                const orderId = Date.now().toString();
                const order = { 
                    id: orderId, 
                    user: STATE.user.user, 
                    items: STATE.cart, 
                    total: parseFloat(document.getElementById('cart-total').innerText), 
                    spot: document.getElementById('cart-spot').value, 
                    status: 'En attente', 
                    timestamp: Date.now(), 
                    date: new Date().toLocaleTimeString('fr-FR') 
                };
                await setDoc(doc(ordersRef, orderId), order);
                
                for(let item of STATE.cart) {
                    const p = STATE.products.find(x => x.id === item.id);
                    await setDoc(doc(productsRef, p.id), {...p, stock: p.stock - item.qty});
                }

                STATE.cart = []; updateCartUI(); toggleCart(false); showView('orders');
                notify("COMMANDE ENVOYÉE !");
            } catch(e) { notify("Erreur Cloud", "error"); }
        };

        window.adminAdd = async () => {
            const n = document.getElementById('adm-n').value.trim();
            const p = parseFloat(document.getElementById('adm-p').value);
            const s = parseInt(document.getElementById('adm-s').value);
            if(!n || isNaN(p)) return;
            const id = Date.now().toString();
            await setDoc(doc(productsRef, id), {id, name:n, price:p, stock:s || 0, timestamp: Date.now()});
            document.getElementById('adm-n').value = ''; 
            document.getElementById('adm-p').value = ''; 
            document.getElementById('adm-s').value = '';
            notify("Stock mis à jour");
        };

        window.adminDel = async (id) => { if(confirm("Supprimer ?")) await deleteDoc(doc(productsRef, id)); };
        window.orderDone = async (id) => {
            const o = STATE.orders.find(x => x.id === id);
            await setDoc(doc(ordersRef, id), {...o, status: 'Livré'});
            notify("Commande livrée");
        };
        window.orderDel = async (id) => await deleteDoc(doc(ordersRef, id));

        function renderAdmin() {
            const inv = document.getElementById('adm-inventory');
            const ord = document.getElementById('adm-orders');
            if(inv) inv.innerHTML = STATE.products.map(p => `
                <div class="flex justify-between items-center bg-white p-4 rounded-xl border border-slate-100 font-bold text-sm">
                    <div class="flex flex-col">
                        <span class="italic underline">${p.name}</span>
                        <span class="text-[10px] text-slate-400">Stk: ${p.stock} | ${p.price.toFixed(2)}€</span>
                    </div>
                    <button onclick="adminDel('${p.id}')" class="text-red-400 hover:text-red-600"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
            
            if(ord) ord.innerHTML = STATE.orders.map(o => `
                <div class="bg-white p-5 rounded-2xl border-2 ${o.status === 'Livré' ? 'border-green-100 opacity-60' : 'border-primary-100 shadow-lg'}">
                    <div class="flex justify-between mb-3">
                        <span class="font-black text-xs px-2 py-1 bg-slate-100 rounded text-slate-600 italic underline">${o.user.toUpperCase()}</span>
                        <span class="font-black text-primary-600">${o.total.toFixed(2)}€</span>
                    </div>
                    <div class="text-[11px] font-bold text-slate-700 mb-1">Spot: ${o.spot}</div>
                    <div class="text-[10px] text-slate-400 mb-4 italic">${o.items.map(i => i.qty+'x '+i.name).join(', ')}</div>
                    <div class="flex gap-2">
                        ${o.status === 'En attente' ? `<button onclick="orderDone('${o.id}')" class="flex-1 py-2 bg-green-500 text-white text-[10px] font-black rounded-lg uppercase shadow-md">Livré</button>` : `<span class="flex-1 py-2 text-center text-green-500 text-[10px] font-black uppercase">Terminé</span>`}
                        <button onclick="orderDel('${o.id}')" class="px-3 bg-slate-100 rounded-lg text-slate-400 hover:text-red-400"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderMyOrders() {
            const mine = STATE.orders.filter(o => o.user === STATE.user?.user);
            const container = document.getElementById('my-orders');
            if(container) container.innerHTML = mine.length ? mine.map(o => `
                <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between mb-2">
                        <span class="text-[10px] font-black uppercase text-slate-400">${o.date}</span>
                        <span class="text-[10px] font-black uppercase ${o.status === 'Livré' ? 'text-green-500' : 'text-primary-600 animate-pulse'}">
                            <i class="fas ${o.status === 'Livré' ? 'fa-check-circle' : 'fa-clock'} mr-1"></i> ${o.status}
                        </span>
                    </div>
                    <p class="font-bold text-sm mb-2 text-slate-700 italic">${o.items.map(i => i.qty+'x '+i.name).join(', ')}</p>
                    <p class="text-xl font-black text-primary-600">${o.total.toFixed(2)}€</p>
                </div>
            `).join('') : '<p class="text-center text-slate-300 font-bold py-10 italic">Rien ici pour le moment</p>';
        }

        window.notify = (m, type="success") => {
            const n = document.createElement('div');
            n.className = `p-4 rounded-xl ${type==='error'?'bg-red-500':'bg-slate-900'} text-white font-black text-[9px] uppercase tracking-widest shadow-2xl transform transition-all duration-300 translate-y-0 opacity-100`;
            n.innerText = m;
            document.getElementById('notifier').appendChild(n);
            setTimeout(() => { n.style.opacity = '0'; setTimeout(() => n.remove(), 300); }, 3000);
        };

        function hideLoader() {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
            }, 500);
        }

        boot();
    </script>
</body>
</html>
