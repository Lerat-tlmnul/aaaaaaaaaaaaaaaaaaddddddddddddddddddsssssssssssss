<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brother's Market | CLOUD PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' }
                    },
                    borderRadius: { '4xl': '2rem', '5xl': '3rem' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }

        .glass { 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255,255,255,0.3); 
        }

        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }

        .img-zoom { transition: transform 0.6s ease; }
        .product-card:hover .img-zoom { transform: scale(1.1); }

        /* Animation Flamme */
        @keyframes flame-vibe {
            0%, 100% { transform: scale(1) rotate(-2deg); filter: drop-shadow(0 0 5px #ff4d00); }
            50% { transform: scale(1.1) rotate(2deg); filter: drop-shadow(0 0 15px #ff8800); }
        }
        .flame-active {
            animation: flame-vibe 0.8s infinite ease-in-out;
            color: #ff4d00 !important;
            display: inline-block;
        }

        @keyframes badge-pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .sale-badge { animation: badge-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .btn-press:active { transform: scale(0.92); }
        #loader { transition: opacity 0.6s ease-in-out; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">

    <!-- CHARGEMENT -->
    <div id="loader" class="fixed inset-0 z-[999] bg-white flex flex-col items-center justify-center text-center px-6">
        <div class="relative">
            <div class="w-16 h-16 border-4 border-slate-100 border-t-primary-600 rounded-full animate-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center"><i class="fas fa-cloud text-primary-600 text-xs"></i></div>
        </div>
        <h2 class="text-2xl font-black tracking-tighter uppercase mt-6">Cloud Engine Init...</h2>
        <p id="loader-error" class="text-red-500 font-bold mt-4 hidden text-xs bg-red-50 p-4 rounded-3xl border border-red-100 max-w-sm"></p>
    </div>

    <!-- NAVIGATION -->
    <nav id="nav" class="fixed top-4 left-1/2 -translate-x-1/2 w-[95%] max-w-7xl z-50 glass h-20 rounded-4xl shadow-2xl hidden px-6 border border-white/50">
        <div class="h-full flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer group" onclick="showView('shop')">
                <div class="w-10 h-10 bg-primary-600 rounded-2xl flex items-center justify-center text-white shadow-lg group-hover:rotate-12 transition-transform">
                    <i class="fas fa-bolt text-sm"></i>
                </div>
                <div class="flex flex-col">
                    <span class="text-xl font-black leading-none">Brother's <span class="text-primary-600">Market</span></span>
                    <span class="text-[8px] font-black uppercase tracking-[0.2em] text-slate-400">Premium Cloud Pro</span>
                </div>
            </div>
            <div class="flex items-center gap-2 sm:gap-4">
                <div class="hidden md:flex items-center bg-slate-100/50 p-1 rounded-2xl border border-slate-200/50">
                    <button onclick="showView('shop')" class="px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white transition-all">Stock</button>
                    <button onclick="showView('orders')" class="px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white transition-all">Commandes</button>
                </div>
                <button id="nav-admin" onclick="showView('admin')" class="hidden bg-slate-900 text-white px-5 py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest hover:bg-primary-600 transition-colors shadow-xl">Admin</button>
                <button onclick="logout()" class="w-10 h-10 flex items-center justify-center rounded-2xl bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all btn-press">
                    <i class="fas fa-power-off text-sm"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- MOBILE NAV -->
    <div class="md:hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex gap-4 bg-slate-900/90 backdrop-blur-xl p-2 rounded-3xl shadow-2xl border border-white/10">
        <button onclick="showView('shop')" class="w-12 h-12 flex items-center justify-center text-white/50 hover:text-white"><i class="fas fa-store"></i></button>
        <button onclick="showView('orders')" class="w-12 h-12 flex items-center justify-center text-white/50 hover:text-white"><i class="fas fa-list-ul"></i></button>
        <button id="mob-admin-btn" onclick="showView('admin')" class="hidden w-12 h-12 flex items-center justify-center text-white/50 hover:text-white"><i class="fas fa-shield-halved"></i></button>
        <button onclick="toggleCart(true)" class="w-12 h-12 flex items-center justify-center bg-primary-600 text-white rounded-2xl"><i class="fas fa-shopping-basket"></i></button>
    </div>

    <main id="main-content" class="pt-32 pb-24 px-4 max-w-7xl mx-auto hidden">
        
        <!-- AUTH -->
        <section id="view-auth" class="flex items-center justify-center py-10 min-h-[70vh]">
            <div class="w-full max-w-md bg-white p-3 rounded-5xl shadow-2xl border border-slate-100 relative">
                <div class="absolute -top-12 left-1/2 -translate-x-1/2 w-24 h-24 bg-primary-600 rounded-[2.5rem] shadow-2xl flex items-center justify-center text-white text-3xl"><i class="fas fa-fingerprint"></i></div>
                <div class="mt-12 p-6">
                    <div class="flex p-2 gap-2 mb-8 bg-slate-50 rounded-3xl">
                        <button id="tab-login" onclick="toggleAuthTab('login')" class="flex-1 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest bg-primary-600 text-white">Connexion</button>
                        <button id="tab-register" onclick="toggleAuthTab('register')" class="flex-1 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest text-slate-400">S'inscrire</button>
                    </div>
                    <div class="space-y-4">
                        <input type="text" id="auth-user" placeholder="Pseudo" class="w-full px-6 py-5 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-primary-500 focus:bg-white outline-none font-bold">
                        <input type="password" id="auth-pass" placeholder="Mot de passe" class="w-full px-6 py-5 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-primary-500 focus:bg-white outline-none font-bold">
                        <button onclick="handleAuth()" class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl uppercase tracking-widest text-[11px] btn-press">Démarrer la session</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- BOUTIQUE -->
        <section id="view-shop" class="hidden">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
                <div>
                    <h1 class="text-5xl font-black tracking-tight italic">Le Stock <span class="text-primary-600">Pro.</span></h1>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="px-3 py-1 bg-primary-50 text-primary-600 rounded-full text-[9px] font-black uppercase tracking-widest">Premium Cloud</span>
                    </div>
                </div>
                <button onclick="toggleCart(true)" class="hidden md:flex relative p-1 bg-white rounded-3xl shadow-2xl border border-slate-100 items-center gap-4 pr-6 hover:scale-105 transition-all">
                    <div class="w-14 h-14 bg-primary-600 rounded-2xl flex items-center justify-center text-white shadow-lg"><i class="fas fa-shopping-basket text-xl"></i></div>
                    <div class="flex flex-col items-start">
                        <span class="text-[9px] font-black text-slate-400 uppercase">Mon Panier</span>
                        <span class="text-lg font-black" id="cart-count-label">0 Article(s)</span>
                    </div>
                    <span id="cart-count" class="absolute -top-2 -right-2 w-8 h-8 bg-slate-900 text-white text-[10px] font-black rounded-full flex items-center justify-center border-4 border-white">0</span>
                </button>
            </div>
            <div id="product-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
        </section>

        <!-- ADMIN -->
        <section id="view-admin" class="hidden space-y-12">
            <div class="bg-slate-900 p-10 rounded-5xl text-white shadow-3xl">
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center border border-white/20"><i class="fas fa-plus text-primary-400"></i></div>
                    <h2 class="text-3xl font-black italic">Nouveau Produit</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
                    <input type="text" id="adm-n" placeholder="Nom..." class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 font-bold">
                    <input type="text" id="adm-p" placeholder="Prix (€)" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 font-bold">
                    <input type="number" id="adm-s" placeholder="Stock" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 font-bold">
                    <input type="text" id="adm-i" placeholder="Lien image" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 font-bold">
                </div>
                <button onclick="adminAdd()" class="w-full py-5 bg-primary-600 text-white font-black rounded-2xl uppercase tracking-widest text-xs btn-press">Ajouter au stock</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
                <div class="bg-white p-8 rounded-5xl shadow-xl">
                    <h3 class="text-2xl font-black mb-8 italic flex items-center gap-3">Gestion de l'Offre</h3>
                    <div id="adm-inventory" class="space-y-4 max-h-[700px] overflow-y-auto pr-2"></div>
                </div>
                <div class="bg-white p-8 rounded-5xl shadow-xl">
                    <h3 class="text-2xl font-black mb-8 italic flex items-center gap-3">Commandes Récentes</h3>
                    <div id="adm-orders" class="space-y-6 max-h-[700px] overflow-y-auto pr-2"></div>
                </div>
            </div>
        </section>

        <!-- COMMANDES -->
        <section id="view-orders" class="hidden max-w-3xl mx-auto">
            <h2 class="text-4xl font-black italic text-center mb-12">Mon Historique</h2>
            <div id="my-orders" class="space-y-6"></div>
        </section>
    </main>

    <!-- PANIER -->
    <div id="cart-panel" class="fixed inset-y-0 right-0 w-full max-w-md bg-white shadow-2xl z-[100] transform translate-x-full transition-transform duration-500 flex flex-col rounded-l-5xl">
        <div class="p-10 flex justify-between items-center border-b border-slate-50">
            <h2 class="text-3xl font-black italic">Panier</h2>
            <button onclick="toggleCart(false)" class="w-12 h-12 flex items-center justify-center bg-slate-50 rounded-2xl text-slate-400 btn-press"><i class="fas fa-times"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-10 space-y-6"></div>
        <div class="p-10 bg-white">
            <div class="bg-slate-50 rounded-4xl p-8 space-y-4 text-sm font-black uppercase tracking-widest">
                <div class="flex justify-between text-slate-400"><span>Articles</span><span id="cart-subtotal">0.00€</span></div>
                <div class="flex justify-between text-slate-400"><span>Frais Cloud</span><span id="cart-fees">0.00€</span></div>
                <div class="pt-4 border-t border-slate-200 flex justify-between items-end text-slate-900">
                    <span class="text-lg">Total</span><span id="cart-total" class="text-4xl italic">0.00€</span>
                </div>
                <button onclick="sendOrder()" class="w-full mt-6 py-6 bg-slate-900 text-white rounded-3xl uppercase tracking-widest text-xs btn-press">Valider l'achat</button>
            </div>
        </div>
    </div>

    <!-- NOTIFIER -->
    <div id="notifier" class="fixed top-8 left-1/2 -translate-x-1/2 z-[110] flex flex-col items-center gap-2 pointer-events-none"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, deleteDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyAoaOJ2K2_mR59CejL69IolD9775BQrJ_0",
            authDomain: "brothers-market-601dd.firebaseapp.com",
            projectId: "brothers-market-601dd",
            storageBucket: "brothers-market-601dd.firebasestorage.app",
            messagingSenderId: "1095476857815",
            appId: "1:1095476857815:web:2e6f5caf2587e14d9e9992"
        };

        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'brothers-market-v1';

        const productsRef = collection(db, 'artifacts', appId, 'public', 'data', 'products');
        const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
        const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');

        let STATE = {
            user: JSON.parse(localStorage.getItem('bm_session')),
            products: [],
            orders: [],
            cart: [],
            isLoaded: false
        };

        async function boot() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (fbUser) => { if (fbUser) setupListeners(); });
            } catch(e) { document.getElementById('loader-error').innerText = e.message; }
        }

        function setupListeners() {
            onSnapshot(productsRef, (snap) => {
                STATE.products = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.timestamp - a.timestamp);
                renderShop();
                if(STATE.user?.role === 'admin') renderAdmin();
                if (!STATE.isLoaded) { STATE.isLoaded = true; hideLoader(); initAppUI(); }
            }, (err) => console.error(err));

            onSnapshot(ordersRef, (snap) => {
                STATE.orders = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.timestamp - a.timestamp);
                renderMyOrders();
                if(STATE.user?.role === 'admin') renderAdmin();
            }, (err) => console.error(err));
        }

        function initAppUI() {
            if(STATE.user) {
                document.getElementById('nav').classList.remove('hidden');
                const isAdmin = STATE.user.role === 'admin';
                document.getElementById('nav-admin').classList.toggle('hidden', !isAdmin);
                if(document.getElementById('mob-admin-btn')) document.getElementById('mob-admin-btn').classList.toggle('hidden', !isAdmin);
                showView('shop');
            } else { showView('auth'); }
        }

        window.handleAuth = async () => {
            const u = document.getElementById('auth-user').value.trim();
            const p = document.getElementById('auth-pass').value.trim();
            const userDoc = await getDoc(doc(usersRef, u.toLowerCase()));
            if(!userDoc.exists() || userDoc.data().password !== p) return notify("Identifiants invalides", "error");
            STATE.user = { user: userDoc.data().username, role: userDoc.data().role };
            localStorage.setItem('bm_session', JSON.stringify(STATE.user));
            initAppUI();
        };

        window.logout = () => { localStorage.clear(); location.reload(); };

        window.showView = (v) => {
            const views = ['view-auth', 'view-shop', 'view-admin', 'view-orders'];
            views.forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('hidden');
            });
            const activeView = document.getElementById(`view-${v}`);
            if(activeView) activeView.classList.remove('hidden');
            if(v === 'admin') renderAdmin();
        };

        function renderShop() {
            const list = document.getElementById('product-list');
            if(!list) return;
            list.innerHTML = STATE.products.map(p => {
                const stock = Number(p.stock) || 0;
                const discount = Number(p.discount) || 0;
                const basePrice = Number(p.price) || 0;
                const finalPrice = discount > 0 ? basePrice * (1 - discount / 100) : basePrice;
                const isFlame = p.isFlame === true;

                return `
                <div class="product-card group bg-white p-5 rounded-4xl border border-slate-100 shadow-sm relative overflow-hidden">
                    ${discount > 0 ? `<div class="sale-badge absolute top-4 left-4 z-10 bg-red-500 text-white text-[10px] font-black px-4 py-2 rounded-2xl shadow-lg">-${discount}%</div>` : ''}
                    <div class="w-full aspect-square bg-slate-50 rounded-3xl mb-6 overflow-hidden relative shadow-inner">
                        <img src="${p.image || 'https://placehold.co/400'}" class="w-full h-full object-cover img-zoom" onerror="this.src='https://placehold.co/400'">
                        <button onclick="addToCart('${p.id}')" ${stock <= 0 ? 'disabled' : ''} class="absolute bottom-4 right-4 w-14 h-14 bg-slate-900 text-white rounded-2xl flex items-center justify-center shadow-2xl opacity-0 group-hover:opacity-100 translate-y-4 group-hover:translate-y-0 transition-all hover:bg-primary-600">
                            <i class="fas fa-cart-plus"></i>
                        </button>
                    </div>
                    <div class="px-2">
                        <h3 class="font-black text-xl italic truncate">${p.name}</h3>
                        <div class="flex items-end justify-between mt-4">
                            <div class="flex flex-col">
                                ${discount > 0 ? `<span class="text-[10px] text-slate-300 line-through font-bold">${basePrice.toFixed(2)}€</span>` : ''}
                                <span class="text-2xl font-black ${isFlame ? 'flame-active' : 'text-primary-600'}">
                                    ${isFlame ? '🔥' : ''} ${finalPrice.toFixed(2)}€
                                </span>
                            </div>
                            <span class="text-[10px] font-black ${stock < 5 ? 'text-red-400' : 'text-slate-300'} uppercase">${stock} DISPO</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.addToCart = (id) => {
            const p = STATE.products.find(x => x.id === id);
            const inCart = STATE.cart.find(x => x.id === id);
            const discount = Number(p.discount) || 0;
            const price = discount > 0 ? Number(p.price) * (1 - discount/100) : Number(p.price);
            
            if(inCart) { 
                if(inCart.qty < p.stock) inCart.qty++; else return notify("Stock limité", "error");
            } else { STATE.cart.push({...p, price, qty: 1}); }
            updateCartUI();
            notify("Ajouté au panier !");
        };

        function updateCartUI() {
            const count = STATE.cart.reduce((a,b) => a+b.qty, 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-count-label').innerText = `${count} Article(s)`;
            const subtotal = STATE.cart.reduce((a,b) => a + (b.price * b.qty), 0);
            const fees = count * 0.5;
            document.getElementById('cart-subtotal').innerText = subtotal.toFixed(2) + "€";
            document.getElementById('cart-fees').innerText = fees.toFixed(2) + "€";
            document.getElementById('cart-total').innerText = (subtotal + fees).toFixed(2) + "€";
            document.getElementById('cart-items').innerHTML = STATE.cart.map(i => `
                <div class="flex gap-4 items-center bg-slate-50 p-4 rounded-3xl">
                    <img src="${i.image}" class="w-12 h-12 rounded-xl object-cover">
                    <div class="flex-1 font-black text-xs truncate italic">${i.name}</div>
                    <div class="text-xs font-black">${i.price.toFixed(2)}€</div>
                    <button onclick="removeFromCart('${i.id}')" class="text-red-400"><i class="fas fa-trash"></i></button>
                </div>`).join('');
        }

        window.removeFromCart = (id) => { STATE.cart = STATE.cart.filter(x => x.id !== id); updateCartUI(); };

        window.sendOrder = async () => {
            if(!STATE.cart.length) return;
            const orderId = "ORD-" + Date.now();
            const total = parseFloat(document.getElementById('cart-total').innerText);
            await setDoc(doc(ordersRef, orderId), { 
                id: orderId, user: STATE.user.user, items: STATE.cart, total, status: 'En attente', 
                timestamp: Date.now(), date: new Date().toLocaleString('fr-FR') 
            });
            for(let item of STATE.cart) {
                const p = STATE.products.find(x => x.id === item.id);
                await updateDoc(doc(productsRef, p.id), { stock: p.stock - item.qty });
            }
            STATE.cart = []; updateCartUI(); toggleCart(false); showView('orders');
        };

        window.adminAdd = async () => {
            const n = document.getElementById('adm-n').value;
            const p = parseFloat(document.getElementById('adm-p').value.replace(',', '.'));
            const s = parseInt(document.getElementById('adm-s').value);
            const i = document.getElementById('adm-i').value;
            if(!n || isNaN(p)) return notify("Erreur saisie", "error");
            const id = Date.now().toString();
            await setDoc(doc(productsRef, id), { id, name: n, price: p, stock: s || 0, image: i, timestamp: Date.now(), discount: 0, isFlame: false });
            notify("Injecté !");
            // Clear inputs
            ['adm-n', 'adm-p', 'adm-s', 'adm-i'].forEach(id => document.getElementById(id).value = '');
        };

        // NOUVELLES FONCTIONS DE MODIFICATION
        window.adminUpdateStock = async (id, delta) => {
            const p = STATE.products.find(x => x.id === id);
            const newVal = Math.max(0, (p.stock || 0) + delta);
            await updateDoc(doc(productsRef, id), { stock: newVal });
        };

        window.adminUpdatePrice = async (id, delta) => {
            const p = STATE.products.find(x => x.id === id);
            const newVal = Math.max(0, (p.price || 0) + delta);
            await updateDoc(doc(productsRef, id), { price: newVal });
        };

        window.adminEditPriceManual = async (id) => {
            const p = STATE.products.find(x => x.id === id);
            const newPrice = prompt(`Modifier le prix de "${p.name}" :`, p.price);
            if(newPrice !== null && !isNaN(parseFloat(newPrice))) {
                await updateDoc(doc(productsRef, id), { price: parseFloat(newPrice.replace(',', '.')) });
                notify("Prix mis à jour");
            }
        };

        window.adminToggleFlame = async (id) => {
            const p = STATE.products.find(x => x.id === id);
            await updateDoc(doc(productsRef, id), { isFlame: !p.isFlame });
            notify(p.isFlame ? "Flamme éteinte" : "FLAMME ACTIVÉE ! 🔥");
        };

        window.adminSetSale = async (id) => {
            const p = STATE.products.find(x => x.id === id);
            const sale = prompt("Pourcentage de solde (ex: 20 pour -20%) :", p.discount || 0);
            if(sale !== null) {
                await updateDoc(doc(productsRef, id), { discount: parseInt(sale) || 0 });
                notify("Soldes mis à jour");
            }
        };

        window.adminDel = async (id) => { if(confirm("Supprimer définitivement ce produit ?")) await deleteDoc(doc(productsRef, id)); };

        function renderAdmin() {
            const inv = document.getElementById('adm-inventory');
            if(!inv) return;
            inv.innerHTML = STATE.products.map(p => `
                <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100 hover:border-primary-200 transition-colors">
                    <div class="flex items-center gap-4 mb-4">
                        <img src="${p.image}" class="w-14 h-14 rounded-2xl object-cover bg-white shadow-sm">
                        <div class="flex-1 min-w-0">
                            <p class="font-black text-sm truncate italic">${p.name}</p>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="text-[9px] font-black uppercase text-primary-600 bg-primary-50 px-2 py-0.5 rounded-md">${p.price.toFixed(2)}€</span>
                                <span class="text-[9px] font-black uppercase text-slate-400 bg-white border border-slate-200 px-2 py-0.5 rounded-md">${p.stock} EN STOCK</span>
                            </div>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="adminToggleFlame('${p.id}')" class="w-10 h-10 rounded-xl ${p.isFlame ? 'bg-orange-500 text-white' : 'bg-white text-slate-300'} shadow-sm transition-all"><i class="fas fa-fire text-xs"></i></button>
                            <button onclick="adminSetSale('${p.id}')" class="w-10 h-10 rounded-xl bg-white text-primary-500 shadow-sm border border-slate-100"><i class="fas fa-percentage text-xs"></i></button>
                        </div>
                    </div>

                    <!-- Contrôles rapides -->
                    <div class="grid grid-cols-2 gap-2 mt-2 pt-3 border-t border-slate-200/50">
                        <div class="flex flex-col gap-1">
                            <span class="text-[8px] font-black uppercase text-slate-400 ml-1">Stock</span>
                            <div class="flex items-center bg-white rounded-xl border border-slate-200 p-1">
                                <button onclick="adminUpdateStock('${p.id}', -1)" class="w-7 h-7 flex items-center justify-center hover:bg-slate-50 rounded-lg text-slate-400"><i class="fas fa-minus text-[10px]"></i></button>
                                <span class="flex-1 text-center font-black text-xs">${p.stock}</span>
                                <button onclick="adminUpdateStock('${p.id}', 1)" class="w-7 h-7 flex items-center justify-center hover:bg-slate-50 rounded-lg text-slate-400"><i class="fas fa-plus text-[10px]"></i></button>
                            </div>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span class="text-[8px] font-black uppercase text-slate-400 ml-1">Prix</span>
                            <div class="flex items-center bg-white rounded-xl border border-slate-200 p-1">
                                <button onclick="adminUpdatePrice('${p.id}', -1)" class="w-7 h-7 flex items-center justify-center hover:bg-slate-50 rounded-lg text-slate-400"><i class="fas fa-minus text-[10px]"></i></button>
                                <button onclick="adminEditPriceManual('${p.id}')" class="flex-1 text-center font-black text-xs hover:text-primary-600 transition-colors">${p.price.toFixed(1)}</button>
                                <button onclick="adminUpdatePrice('${p.id}', 1)" class="w-7 h-7 flex items-center justify-center hover:bg-slate-50 rounded-lg text-slate-400"><i class="fas fa-plus text-[10px]"></i></button>
                            </div>
                        </div>
                    </div>
                    
                    <button onclick="adminDel('${p.id}')" class="w-full mt-3 py-2 text-[8px] font-black uppercase tracking-widest text-red-300 hover:text-red-500 transition-colors italic">Supprimer l'article</button>
                </div>`).join('');
            
            const ord = document.getElementById('adm-orders');
            if(ord) ord.innerHTML = STATE.orders.map(o => `
                <div class="bg-slate-50 p-5 rounded-4xl border ${o.status === 'Livré' ? 'opacity-50' : 'border-primary-200'}">
                    <div class="flex justify-between font-black text-xs mb-2"><span>${o.user}</span><span>${o.total.toFixed(2)}€</span></div>
                    <p class="text-[9px] font-bold text-slate-400 mb-4">${o.items.map(i => i.qty+'x '+i.name).join(', ')}</p>
                    ${o.status === 'En attente' ? `<button onclick="orderDone('${o.id}')" class="w-full py-2 bg-primary-600 text-white text-[8px] font-black uppercase rounded-lg">Livrer</button>` : ''}
                </div>`).join('');
        }

        window.orderDone = async (id) => { await updateDoc(doc(ordersRef, id), { status: 'Livré' }); };

        function renderMyOrders() {
            const mine = STATE.orders.filter(o => o.user === STATE.user?.user);
            const myOrdersEl = document.getElementById('my-orders');
            if(myOrdersEl) {
                myOrdersEl.innerHTML = mine.length ? mine.map(o => `
                    <div class="bg-white p-6 rounded-5xl border border-slate-100 shadow-sm">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-[10px] font-black text-slate-300">${o.date}</span>
                            <span class="text-[8px] font-black uppercase px-2 py-1 ${o.status === 'Livré' ? 'bg-green-50 text-green-600' : 'bg-primary-50 text-primary-600'} rounded-lg">${o.status}</span>
                        </div>
                        <div class="text-2xl font-black italic underline decoration-primary-200">${o.total.toFixed(2)}€</div>
                        <div class="mt-2 text-[9px] font-bold text-slate-400">${o.items.map(i => i.qty + 'x ' + i.name).join(', ')}</div>
                    </div>`).join('') : '<div class="text-center py-20 text-slate-300 font-black italic">Aucune commande trouvée.</div>';
            }
        }

        window.notify = (m, type="success") => {
            const n = document.createElement('div');
            n.className = `px-8 py-5 rounded-3xl ${type==='error'?'bg-red-500':'bg-slate-900'} text-white font-black text-[10px] uppercase tracking-widest shadow-2xl transition-all duration-500 flex items-center gap-3 mb-2`;
            n.innerHTML = `<i class="fas ${type==='error'?'fa-triangle-exclamation':'fa-circle-check'}"></i> ${m}`;
            const notifier = document.getElementById('notifier');
            if(notifier) {
                notifier.appendChild(n);
                setTimeout(() => { n.style.opacity = '0'; n.style.transform = 'translateY(-20px)'; setTimeout(() => n.remove(), 500); }, 3000);
            }
        };

        window.toggleCart = (s) => document.getElementById('cart-panel').style.transform = s ? 'translateX(0)' : 'translateX(100%)';
        function hideLoader() { document.getElementById('loader').style.opacity = '0'; setTimeout(() => { document.getElementById('loader').style.display = 'none'; document.getElementById('main-content').classList.remove('hidden'); }, 600); }
        boot();
    </script>
</body>
</html>
